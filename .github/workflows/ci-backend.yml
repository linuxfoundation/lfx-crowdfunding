---
name: CI — Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.ref }}-backend-ci
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crowdfunding
          POSTGRES_PASSWORD: crowdfunding
          POSTGRES_DB: crowdfunding
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run DB migrations
        run: |
          for f in backend/db/migrations/*.up.sql; do
            psql "postgres://crowdfunding:crowdfunding@localhost:5432/crowdfunding" \
              --variable=ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgres://crowdfunding:crowdfunding@localhost:5432/crowdfunding?search_path=crowdfunding,public
        run: go test -race -count=1 ./...

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/linuxfoundation/lfx-crowdfunding-backend
          tags: |
            type=raw,value=development,enable={{is_default_branch}}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend/
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
