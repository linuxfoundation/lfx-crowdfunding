---
name: CI — Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.ref }}-backend-ci
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/linuxfoundation/lfx-crowdfunding-backend
          tags: |
            type=raw,value=development,enable={{is_default_branch}}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend/
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify ArgoCD image updater
        if: github.event_name != 'pull_request'
        run: |
          payload='{"action":"published","package_type":"container",'
          payload+='"registry":{"url":"ghcr.io"},'
          payload+='"repository":{"name":"lfx-crowdfunding-backend",'
          payload+='"full_name":"linuxfoundation/lfx-crowdfunding-backend"},'
          payload+='"package":{"name":"lfx-crowdfunding-backend",'
          payload+='"package_version":{"container_metadata":{"tag":{"name":"development"}}}}}'
          webhook=https://argocd-image-updater.dev.v2.cluster.linuxfound.info/webhook
          curl -sf -X POST "$webhook" -H "Content-Type: application/json" -d "$payload" || true
