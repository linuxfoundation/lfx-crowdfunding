---
name: CI — Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.ref }}-frontend-ci
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/linuxfoundation/lfx-crowdfunding-frontend
          tags: |
            type=raw,value=development,enable={{is_default_branch}}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frontend/
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify ArgoCD image updater
        if: github.event_name != 'pull_request'
        run: |
          curl -sf -X POST https://argocd-image-updater.dev.v2.cluster.linuxfound.info/webhook \
            -H "Content-Type: application/json" \
            -d '{
              "action": "published",
              "package_type": "container",
              "registry": {"url": "ghcr.io"},
              "repository": {"name": "lfx-crowdfunding-frontend", "full_name": "linuxfoundation/lfx-crowdfunding-frontend"},
              "package": {"name": "lfx-crowdfunding-frontend", "package_version": {"container_metadata": {"tag": {"name": "development"}}}}
            }' || true
