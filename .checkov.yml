---
# CKV_K8S_43: Image digest pinning is a deployment-time concern — the image tag
# is supplied at deploy time via .Values.image.tag or the CI pipeline. Enforcing
# digest in the chart template itself is not feasible.
#
# CKV_K8S_21: All templates use namespace: {{ .Release.Namespace }} so the
# namespace is always set at deploy time. Checkov evaluates Helm templates by
# rendering with .Release.Namespace = "default", producing a false positive.
#
# CKV_K8S_35: The application reads secrets (DATABASE_URL, STRIPE_SECRET_KEY,
# etc.) from environment variables by design. envFrom.secretRef is the correct
# Kubernetes pattern for this; mounting as files would require changing the
# application's config loading code.
#
# CKV_SECRET_6: docker-compose.yml uses POSTGRES_PASSWORD: crowdfunding — a
# local dev-only placeholder, not a real secret. Checkov's entropy scanner
# produces a false positive on this value.
skip-check:
  - CKV_K8S_43
  - CKV_K8S_21
  - CKV_K8S_35
  - CKV_SECRET_6
