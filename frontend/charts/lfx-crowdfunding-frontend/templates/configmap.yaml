apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lfx-crowdfunding-frontend.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lfx-crowdfunding-frontend.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
