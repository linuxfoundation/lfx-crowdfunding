{{- if .Values.createPlaceholderSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lfx-crowdfunding-frontend.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation
    helm.sh/hook-weight: "-5"
type: Opaque
# data intentionally empty — ESO/operator populates it
{{- end }}
