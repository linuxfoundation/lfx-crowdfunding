# prettier-ignore
{{ if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lfx-crowdfunding-frontend.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lfx-crowdfunding-frontend.labels" . | nindent 4 }}
  annotations: {{- .Values.serviceAccount.annotations | default (dict) | toYaml | nindent 4 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
---
# prettier-ignore
{{ end }}
