---
GITHUB_COMMENT_REPORTER: false

DISABLE_LINTERS:
  # Duplicate-code detection produces too much noise for this repo.
  - COPYPASTE_JSCPD
  # No deployable code or IaC in this repo — vulnerability and IaC scanners
  # produce only false positives against documentation files.
  - REPOSITORY_GRYPE
  - REPOSITORY_KICS
  # v8r schema validation is not useful for this repo's JSON/YAML files.
  - JSON_V8R
  - YAML_V8R
  # cspell produces too much noise on legitimate project terminology.
  - SPELL_CSPELL
  # lychee link checker is redundant with markdown-link-check.
  - SPELL_LYCHEE
  # stylelint-config-standard-scss is not bundled in the megalinter image;
  # CSS_SCSS_LINT covers SCSS files instead.
  - CSS_STYLELINT
  # Project uses eslint + typescript-eslint; ts-standard is redundant and
  # cannot locate the tsconfig.json from the workspace root.
  - TYPESCRIPT_STANDARD

DISABLE_ERRORS_LINTERS:
  # boto3 and psycopg2 are runtime dependencies not installed in the MegaLinter
  # container; import errors from these linters are false positives.
  - PYTHON_PYLINT
  - PYTHON_PYRIGHT
  - PYTHON_MYPY
  # devskim crashes with XML parse errors on non-XML files (tool bug, not a real
  # security finding). Treat as non-fatal until upstream fixes it.
  - REPOSITORY_DEVSKIM
  # The Go module lives in backend/, not the repo root. Running golangci-lint /
  # revive from the workspace root produces:
  #   [linters_context] typechecking error: pattern ./...: directory prefix .
  #   does not contain main module or its selected dependencies
  # Treat these as non-fatal until GO_*_DIRECTORY scoping is supported.
  - GO_GOLANGCI_LINT
  - GO_REVIVE

# Prevent cspell from flagging filenames (e.g. CODEOWNERS, mkdocs) as words.
SPELL_CSPELL_ANALYZE_FILE_NAMES: false

# The Go module lives in backend/ — run Go linters from there so they can
# resolve the module graph and avoid "directory prefix . does not contain
# main module" errors.
GO_GOLANGCI_LINT_DIRECTORY: backend
GO_REVIVE_DIRECTORY: backend

# Exclude .claude/ skill files — these are tool configuration, not application
# code, and contain markdown with intentional bare fences (example snippets).
FILTER_REGEX_EXCLUDE: (\.claude/)
