---
GITHUB_COMMENT_REPORTER: false

DISABLE_LINTERS:
  # Duplicate-code detection produces too much noise for this repo.
  - COPYPASTE_JSCPD
  # No deployable code or IaC in this repo — vulnerability and IaC scanners
  # produce only false positives against documentation files.
  - REPOSITORY_GRYPE
  - REPOSITORY_KICS
  # v8r schema validation is not useful for this repo's JSON/YAML files.
  - JSON_V8R
  - YAML_V8R
  # cspell produces too much noise on legitimate project terminology.
  - SPELL_CSPELL
  # lychee link checker is redundant with markdown-link-check.
  - SPELL_LYCHEE
  # stylelint-config-standard-scss is not bundled in the megalinter image;
  # CSS_SCSS_LINT covers SCSS files instead.
  - CSS_STYLELINT
  # Project uses eslint + typescript-eslint; ts-standard is redundant and
  # cannot locate the tsconfig.json from the workspace root.
  - TYPESCRIPT_STANDARD
