{{- if .Values.cronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "lfx-v2-initiatives-service.fullname" . }}-ledger-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lfx-v2-initiatives-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: ledger-stats-sync
spec:
  schedule: {{ .Values.cronJob.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronJob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.cronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/component: ledger-stats-sync
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "lfx-v2-initiatives-service.serviceAccountName" . }}
          automountServiceAccountToken: false
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: ledger-stats-sync
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              image: "{{ .Values.cronJob.image.repository | default .Values.image.repository }}:{{ .Values.cronJob.image.tag | default (required "image.tag is required" .Values.image.tag) }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/app/ledger-stats-sync"]
              {{- with .Values.env }}
              env:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              envFrom:
                - configMapRef:
                    name: {{ include "lfx-v2-initiatives-service.fullname" . }}-config
                - secretRef:
                    name: {{ .Values.secretName }}
              resources:
                {{- toYaml .Values.cronJob.resources | nindent 16 }}
{{- end }}
