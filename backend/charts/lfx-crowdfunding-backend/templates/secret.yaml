#
# Placeholder Secret — created once on first install via a pre-install hook,
# never reconciled on upgrades. Only rendered when createPlaceholderSecret=true.
#
# Default is false: in production/staging environments the Secret MUST already
# exist before helm install runs (created and owned by ESO with the default
# creationPolicy: Owner). Setting this to true is intended for local development
# clusters where no external operator pre-creates the Secret.
#
# If you enable this alongside ESO, configure the ExternalSecret with
# creationPolicy: Merge — otherwise ESO will refuse to take ownership of a
# Secret it did not create and the sync will fail.
#
# Required keys populated by the external operator:
#   username, password, host, port, dbname — RDS components
#   STRIPE_SECRET_KEY        — Stripe API secret key
#   STRIPE_WEBHOOK_SECRET    — Stripe webhook signing secret
#   LEDGER_API_KEY           — Ledger service API key
#   REIMBURSEMENTS_API_KEY   — Reimbursement Service pre-shared API key
{{- if .Values.createPlaceholderSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lfx-v2-initiatives-service.labels" . | nindent 4 }}
  annotations:
    # pre-install: only rendered during helm install, not helm upgrade.
    # before-hook-creation: if the Secret already exists (e.g. ESO created it)
    # Helm will not delete and re-create it — the hook is simply skipped.
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation
    helm.sh/hook-weight: "-5"
type: Opaque
# data is intentionally omitted — the external operator populates it.
{{- end }}
