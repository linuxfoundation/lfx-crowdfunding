---
replicaCount: 2

image:
  repository: ghcr.io/linuxfoundation/lfx-crowdfunding-backend
  pullPolicy: Always
  tag: "" # required — set per environment via ArgoCD values

imagePullSecrets: []

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /livez
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

# ── Non-secret environment variables ────────────────────────────────────────
# These are rendered into a ConfigMap and mounted via envFrom.
config:
  JWKS_URL: ""
  JWT_AUDIENCE: ""
  JWT_ISSUER: ""
  LEDGER_BASE_URL: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  OTEL_SERVICE_NAME: "lfx-crowdfunding-backend"
  # REQUIRED — the frontend URL Stripe redirects to after a 3DS challenge.
  # Must be the public HTTPS URL of the /payment/complete page, e.g.:
  #   https://crowdfunding.linuxfoundation.org/payment/complete
  # Leaving this empty will cause helm install/upgrade to fail.
  STRIPE_RETURN_URL: ""
  # Comma-separated LF SSO usernames allowed to approve or decline initiatives.
  # Example: "alice,bob,carol"
  ALLOWED_APPROVERS: ""

# ── Additional environment variables ─────────────────────────────────────────
# Rendered as a Kubernetes env: list on the Deployment and CronJob.
# Supports the full env entry schema (value:, valueFrom:, etc.).
# Override in ArgoCD values to inject secretKeyRef entries (e.g. DB components).
env: []

# ── Secret environment variables ─────────────────────────────────────────────
# These are sourced from a Kubernetes Secret via envFrom.secretRef.
# The Secret itself is managed externally (e.g. External Secrets Operator
# syncing from AWS Secrets Manager).
#
# Expected keys in the Secret:
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, LEDGER_API_KEY
#   username, password, host, port, dbname — RDS components (referenced via env: above)
secretName: lfx-crowdfunding-backend-secrets

# createPlaceholderSecret — opt-in, defaults to false.
#
# When false (default): the Secret must already exist before helm install runs.
# ESO (or another operator) creates and owns it with the default
# creationPolicy: Owner. This is the correct setting for all non-local
# environments.
#
# When true: the chart creates an empty Secret placeholder via a pre-install
# hook so the Deployment's envFrom.secretRef resolves on a brand-new cluster
# with no pre-existing Secret (e.g. local development with kind/minikube).
# WARNING: if ESO is also managing this Secret it MUST be configured with
# creationPolicy: Merge — otherwise ESO will refuse to take ownership of a
# Secret it did not create and the sync will fail silently.
createPlaceholderSecret: false

# ── CronJob: ledger-stats-sync ────────────────────────────────────────────────
# Runs hourly to sync financial data from the ledger service into initiative_ledger_stats.
cronJob:
  enabled: true
  schedule: "0 * * * *"    # every hour on the hour
  image:
    # Defaults to same repository and tag as the main API image.
    # Override only if building a separate image for the CronJob.
    repository: ""
    tag: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Retain last 3 successful and 1 failed job for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  # Forbid concurrent runs (previous job must complete before next fires)
  concurrencyPolicy: Forbid
