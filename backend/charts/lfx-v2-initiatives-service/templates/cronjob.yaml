{{- if .Values.cronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "lfx-v2-initiatives-service.fullname" . }}-ledger-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lfx-v2-initiatives-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: ledger-stats-sync
spec:
  schedule: {{ .Values.cronJob.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronJob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.cronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/component: ledger-stats-sync
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "lfx-v2-initiatives-service.serviceAccountName" . }}
          automountServiceAccountToken: false
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: ledger-stats-sync
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              image: "{{ .Values.cronJob.image.repository | default .Values.image.repository }}:{{ .Values.cronJob.image.tag | default (.Values.image.tag | default .Chart.AppVersion) }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/app/ledger-stats-sync"]
              env:
                - name: DB_HOST
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secretName }}
                      key: host
                - name: DB_PORT
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secretName }}
                      key: port
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secretName }}
                      key: username
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secretName }}
                      key: password
                - name: DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secretName }}
                      key: dbname
                - name: DATABASE_URL
                  value: "host=$(DB_HOST) port=$(DB_PORT) user=$(DB_USER) password=$(DB_PASSWORD) dbname=$(DB_NAME) sslmode=require"
              envFrom:
                - configMapRef:
                    name: {{ include "lfx-v2-initiatives-service.fullname" . }}-config
                - secretRef:
                    name: {{ .Values.secretName }}
              resources:
                {{- toYaml .Values.cronJob.resources | nindent 16 }}
{{- end }}
