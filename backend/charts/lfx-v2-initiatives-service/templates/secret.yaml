#
# Placeholder Secret — data is managed externally.
#
# In non-local environments this Secret must be populated by an external
# operator (e.g. External Secrets Operator syncing from AWS Secrets Manager)
# before the Deployment starts. The chart creates the object so the
# Deployment's envFrom.secretRef reference resolves; if ESO owns the Secret
# it will overwrite this placeholder with real data.
#
# Required keys:
#   DATABASE_URL          — PostgreSQL connection string
#   STRIPE_SECRET_KEY     — Stripe API secret key
#   STRIPE_WEBHOOK_SECRET — Stripe webhook signing secret
#   LEDGER_API_KEY        — Ledger service API key
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretName }}
  labels:
    {{- include "lfx-v2-initiatives-service.labels" . | nindent 4 }}
  annotations:
    # Tell ESO (or Helm) that this Secret's data is managed externally.
    # Remove this annotation only if you are managing the Secret via Helm values.
    helm.sh/resource-policy: keep
type: Opaque
# data is intentionally empty — populated by ESO or a secrets operator.
data: {}
