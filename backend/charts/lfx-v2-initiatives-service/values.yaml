---
replicaCount: 2

image:
  repository: ghcr.io/linuxfoundation/lfx-v2-initiatives-service
  pullPolicy: IfNotPresent
  tag: ""  # defaults to .Chart.AppVersion

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /livez
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

# ── Non-secret environment variables ────────────────────────────────────────
# These are rendered into a ConfigMap and mounted via envFrom.
config:
  JWKS_URL: ""
  JWT_AUDIENCE: ""
  JWT_ISSUER: ""
  LEDGER_BASE_URL: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  OTEL_SERVICE_NAME: "lfx-v2-initiatives-service"

# ── Secret environment variables ─────────────────────────────────────────────
# These are sourced from a Kubernetes Secret via envFrom.secretRef.
# The Secret itself is managed externally (e.g. External Secrets Operator
# syncing from AWS Secrets Manager). The chart creates an empty placeholder
# Secret so the Deployment can reference it; ESO or another operator is
# expected to own the Secret's data in non-local environments.
#
# Expected keys in the Secret:
#   DATABASE_URL, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, LEDGER_API_KEY
secretName: lfx-v2-initiatives-service-secrets
