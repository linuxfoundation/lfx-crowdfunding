---
replicaCount: 2

image:
  repository: ghcr.io/linuxfoundation/lfx-v2-initiatives-service
  pullPolicy: IfNotPresent
  tag: ""  # defaults to .Chart.AppVersion

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /livez
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

# ── Non-secret environment variables ────────────────────────────────────────
# These are rendered into a ConfigMap and mounted via envFrom.
config:
  JWKS_URL: ""
  JWT_AUDIENCE: ""
  JWT_ISSUER: ""
  LEDGER_BASE_URL: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  OTEL_SERVICE_NAME: "lfx-v2-initiatives-service"

# ── Secret environment variables ─────────────────────────────────────────────
# These are sourced from a Kubernetes Secret via envFrom.secretRef.
# The Secret itself is managed externally (e.g. External Secrets Operator
# syncing from AWS Secrets Manager).
#
# Expected keys in the Secret:
#   DATABASE_URL, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, LEDGER_API_KEY
secretName: lfx-v2-initiatives-service-secrets

# createPlaceholderSecret — opt-in, defaults to false.
#
# When false (default): the Secret must already exist before helm install runs.
# ESO (or another operator) creates and owns it with the default
# creationPolicy: Owner. This is the correct setting for all non-local
# environments.
#
# When true: the chart creates an empty Secret placeholder via a pre-install
# hook so the Deployment's envFrom.secretRef resolves on a brand-new cluster
# with no pre-existing Secret (e.g. local development with kind/minikube).
# WARNING: if ESO is also managing this Secret it MUST be configured with
# creationPolicy: Merge — otherwise ESO will refuse to take ownership of a
# Secret it did not create and the sync will fail silently.
createPlaceholderSecret: false
