# Local development stack — Postgres only.
# Start:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v  (wipes DB volume)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crowdfunding
      POSTGRES_PASSWORD: crowdfunding
      POSTGRES_DB: crowdfunding
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crowdfunding"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
